<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>P2P Web Share - Direct Browser-to-Browser File Transfer</title>
    <script>
        // Polyfill for SimplePeer and randombytes compatibility
        if (typeof window !== 'undefined') {
            window.global = window;
            if (!window.crypto) {
                window.crypto = {
                    getRandomValues: (arr) => {
                        for (let i = 0; i < arr.length; i++) {
                            arr[i] = Math.floor(Math.random() * 256);
                        }
                        return arr;
                    }
                };
            }
        }
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
